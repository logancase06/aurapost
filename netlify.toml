# ─────────────────────────────────────────────────────────────────────────────
# AuraPost — configuration Netlify (Next.js 16, App Router)
#
# Le plugin officiel @netlify/plugin-nextjs gère :
#   - le routage App Router (SSR/SSG/ISR) → pas de redirect SPA manuel,
#   - le déploiement du middleware (proxy.ts) en Edge Function,
#   - les Route Handlers en Netlify Functions (Lambda).
# Les headers de sécurité (CSP, X-Frame-Options, …) sont posés dynamiquement par
# proxy.ts ; on les redouble ici pour les assets statiques servis hors middleware.
# ─────────────────────────────────────────────────────────────────────────────

[build]
  # --include=optional garantit l'installation de @img/sharp-linux-x64 (binaire natif sharp).
  command = "npm install --include=optional && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"
  NPM_FLAGS = "--no-audit --no-fund --include=optional"

# Inclut les bibliothèques partagées de sharp (.so) dans le bundle des fonctions Netlify.
[functions]
  included_files = ["node_modules/@img/**"]

[[plugins]]
  package = "@netlify/plugin-nextjs"

# ── Headers de sécurité (filet de sécurité pour le statique) ─────────────────
# proxy.ts reste la source de vérité pour les pages/API dynamiques.
[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options = "DENY"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=(), payment=()"
    Cross-Origin-Opener-Policy = "same-origin"
    Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"

# Assets immuables (hash dans le nom) — cache agressif.
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/fonts/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Redirections ──────────────────────────────────────────────────────────────
# Lien de parrainage court → page d'inscription avec code prérempli.
[[redirects]]
  from = "/ref/:code"
  to = "/register?ref=:code"
  status = 302
  force = false

# Health check : alias court.
[[redirects]]
  from = "/healthz"
  to = "/api/health"
  status = 200
  force = true

# ── Edge Functions ────────────────────────────────────────────────────────────
# Le middleware Next (proxy.ts) est automatiquement déployé en Edge par le plugin.
# Aucune edge function manuelle nécessaire : déclaré ici pour la traçabilité.
#
# ── Crons (planification externe, cf. DEPLOY.md) ────────────────────────────────
# Les route handlers ne sont pas planifiés par le plugin Next : un planificateur
# externe doit appeler ces URLs avec `Authorization: Bearer $CRON_SECRET`.
#   /api/cron/reconcile-jobs        → toutes les 10 min (jobs bloqués + nettoyage)
#   /api/cron/email-sequences       → 1×/jour
#   /api/cron/distributor-activation→ 1×/jour
#   /api/cron/monthly-reminder      → 1×/jour
#   /api/cron/data-retention        → 1×/jour
#   /api/cron/payment-grace         → 1×/jour (downgrade tenants en retard de paiement > 7j)
